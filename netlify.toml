[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/analyze-background"
  to = "/.netlify/functions/analyze-background"
  status = 200

[[redirects]]
  from = "/api/job-status"
  to = "/.netlify/functions/job-status"
  status = 200

[[redirects]]
  from = "/api/push-notion"
  to = "/.netlify/functions/push-notion"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
