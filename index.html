<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comunicano Sports Intel</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070f;--surface:#0f0f22;--border:#20203e;
  --text:#ddddf0;--muted:#55558a;--dim:#33336a;
  --accent:#4455cc;--accent-h:#5566dd;
  --green:#44bb77;--red:#bb4444;--yellow:#aaaa55;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:780px;margin:0 auto;padding:0 0 40px}
/* Header */
.hdr{background:linear-gradient(135deg,var(--surface),#13132a);border-bottom:1px solid var(--border);padding:20px 28px;display:flex;justify-content:space-between;align-items:center}
.hdr-left h1{font-size:20px;font-weight:800;letter-spacing:.3px}
.hdr-left p{font-size:10px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:1.5px}
.hdr-right{display:flex;gap:8px;align-items:center}
/* Steps bar */
.steps{display:flex;gap:0;border-bottom:1px solid var(--border);background:var(--surface);padding:0 28px}
.step{flex:1;padding:10px 0;font-size:11px;font-weight:600;color:var(--dim);text-align:center;cursor:default;border-bottom:2px solid transparent;transition:all .2s}
.step.active{color:var(--text);border-bottom-color:var(--accent)}
.step.done{color:var(--green)}
/* Main */
.main{padding:24px 28px}
.section{display:none}
.section.active{display:block;animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
/* Form elements */
.lbl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px}
textarea,input{width:100%;background:#0d0d1c;border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:14px;padding:13px;resize:vertical;line-height:1.6;transition:border-color .2s}
textarea:focus,input:focus{outline:none;border-color:var(--accent)}
input{resize:none;height:auto;padding:11px 13px}
.url-ta{min-height:110px;max-height:200px}
.rpt-ta{min-height:380px;font-size:13px}
/* Buttons */
button{cursor:pointer;border:none;border-radius:8px;font-family:inherit;font-weight:600;font-size:14px;padding:12px 20px;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent-h));color:#fff}
.btn-primary:hover{filter:brightness(1.1)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;filter:none}
.btn-secondary{background:#141428;color:#7777bb;border:1px solid var(--border)}
.btn-secondary:hover{background:#1e1e36;color:#aaaadd}
.btn-row{display:flex;gap:10px;margin-top:16px}
.btn-row .btn-primary{flex:1}
.btn-row .btn-secondary{flex:0 0 auto}
.full-btn{width:100%;margin-top:14px}
/* Progress */
.progress-list{margin-top:4px}
.prog-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #0f0f20;font-size:13px;color:var(--dim)}
.prog-item.done{color:var(--green)}
.prog-item.active{color:#9999ee}
.prog-item.error{color:var(--red)}
.prog-dot{width:8px;height:8px;border-radius:50%;background:#1e1e3a;flex-shrink:0}
.prog-item.done .prog-dot{background:var(--green)}
.prog-item.active .prog-dot{background:#9999ee;animation:pulse 1s infinite}
.prog-item.error .prog-dot{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.log{font-size:11px;color:#3a3a5a;font-family:monospace;background:#040410;border:1px solid #0f0f20;border-radius:7px;padding:11px;min-height:80px;max-height:140px;overflow-y:auto;margin-top:14px;white-space:pre-wrap}
/* Records */
.records-header{display:flex;justify-content:space-between;align-items:center;margin:18px 0 8px}
.records-header .lbl{margin-bottom:0}
.rec-count{background:var(--accent);color:#fff;border-radius:12px;padding:2px 9px;font-size:11px;font-weight:700}
.records-grid{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.rec-card{background:#0b0b1a;border:1px solid #18182e;border-radius:8px;padding:14px;transition:border-color .2s}
.rec-card:hover{border-color:var(--dim)}
.rec-card-title{font-size:14px;font-weight:700;margin-bottom:6px;color:var(--text)}
.rec-meta{font-size:11px;color:var(--muted);margin-bottom:6px}
.rec-summary{font-size:12.5px;color:#9999bb;line-height:1.5;margin-bottom:8px}
.tags-row{display:flex;flex-wrap:wrap;gap:4px}
.chip{font-size:10px;border-radius:5px;padding:2px 7px;font-weight:500}
.chip-cat{background:#1a1a3a;border:1px solid #2a2a5a;color:#8888cc}
.chip-tag{background:#121228;border:1px solid #1e1e3e;color:var(--dim)}
/* Results */
.result-item{display:flex;align-items:flex-start;gap:10px;padding:11px 0;border-bottom:1px solid #0f0f20;font-size:13px}
.result-ok .ri{color:var(--green);font-size:16px}
.result-fail .ri{color:var(--red);font-size:16px}
.result-err-msg{font-size:11px;color:#774444;margin-top:3px}
.success-box{background:#071510;border:1px solid #1a4429;border-radius:8px;padding:16px;color:var(--green);font-size:14px;text-align:center;margin-top:18px;font-weight:600}
.error-box{background:#130607;border:1px solid #361418;border-radius:8px;padding:14px;color:#cc7777;font-size:13px;margin-top:14px}
.warn-box{background:#0d0d06;border:1px solid #282810;border-radius:7px;padding:11px 14px;color:var(--yellow);font-size:12px;margin-bottom:10px}
/* Notion links */
.notion-link{font-size:11px;color:#5555aa;text-decoration:none;display:inline-block;margin-top:3px}
.notion-link:hover{color:#8888dd;text-decoration:underline}
/* Copy toolbar */
.copy-bar{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.copy-bar .lbl{margin-bottom:0;flex:1}
.btn-copy{background:#0f0f22;border:1px solid var(--border);color:#7777bb;border-radius:6px;font-size:11px;font-weight:700;padding:6px 12px;letter-spacing:.5px;text-transform:uppercase;display:flex;align-items:center;gap:5px;transition:all .2s}
.btn-copy:hover{background:#1a1a32;border-color:var(--accent);color:#aaaaee}
.btn-copy.copied{background:#0d2018;border-color:var(--green);color:var(--green)}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-left">
    <h1>🏆 Comunicano Sports Intel</h1>
    <p>Onion Process &middot; Daily Intelligence &middot; Notion</p>
  </div>
</div>

<div class="steps">
  <div class="step active" id="step1">1. Sources</div>
  <div class="step" id="step2">2. Analyze</div>
  <div class="step" id="step3">3. Review</div>
  <div class="step" id="step4">4. Publish</div>
</div>

<div class="main">

  <!-- Section 1: URL input -->
  <div class="section active" id="s1">
    <div class="lbl">Article Sources</div>
    <textarea class="url-ta" id="urlInput"
      placeholder="Paste article URLs — one per line&#10;&#10;https://frontofficesports.com/...&#10;https://sportico.com/...&#10;https://theathletic.com/..."></textarea>
    <button class="btn-primary full-btn" onclick="runAnalysis()">Run Analysis →</button>
  </div>

  <!-- Section 2: Progress -->
  <div class="section" id="s2">
    <div class="lbl">Analysis in Progress</div>
    <div class="progress-list" id="progList"></div>
    <div class="log" id="logArea"></div>
  </div>

  <!-- Section 3: Review -->
  <div class="section" id="s3">
    <div class="copy-bar">
      <div class="lbl">Editorial Report — edit before publishing</div>
      <button class="btn-copy" id="cpMd"   onclick="copyReport('md')"  title="Copy as Markdown">⬇ MD</button>
      <button class="btn-copy" id="cpTxt"  onclick="copyReport('txt')" title="Copy as Plain Text">⬇ TXT</button>
      <button class="btn-copy" id="cpHtml" onclick="copyReport('html')" title="Copy as HTML">⬇ HTML</button>
    </div>
    <textarea class="rpt-ta" id="reportArea"></textarea>

    <div class="records-header">
      <div class="lbl">Onion Records</div>
      <span class="rec-count" id="recCountBadge">0</span>
    </div>
    <div class="records-grid" id="recordsGrid"></div>

    <div class="btn-row">
      <button class="btn-secondary" onclick="goToSection(1)">← Back</button>
      <button class="btn-primary" onclick="publishToNotion()">Push to Notion →</button>
    </div>
  </div>

  <!-- Section 4: Results -->
  <div class="section" id="s4">
    <div class="lbl">Notion Publish Results</div>
    <div id="resultsList"></div>
    <button class="btn-primary full-btn" onclick="startOver()" style="margin-top:20px">Start New Report</button>
  </div>

</div>

<script>
/* ── State ─────────────────────────────────────────────────────────── */
let STATE = { articles: [], report: '', records: [] };

/* ── Navigation ────────────────────────────────────────────────────── */
function goToSection(n) {
  document.querySelectorAll('.section').forEach((el, i) => el.classList.toggle('active', i + 1 === n));
  document.querySelectorAll('.step').forEach((el, i) => {
    el.classList.toggle('active', i + 1 === n);
    el.classList.toggle('done', i + 1 < n);
  });
}

function startOver() {
  STATE = { articles: [], report: '', records: [] };
  document.getElementById('urlInput').value = '';
  document.getElementById('progList').innerHTML = '';
  document.getElementById('logArea').textContent = '';
  goToSection(1);
}

/* ── Progress helpers ──────────────────────────────────────────────── */
function addProg(id, text) {
  const el = document.createElement('div');
  el.className = 'prog-item';
  el.id = 'pg-' + id;
  el.innerHTML = `<div class="prog-dot"></div><span>${text}</span>`;
  document.getElementById('progList').appendChild(el);
}
function setProg(id, status, text) {
  const el = document.getElementById('pg-' + id);
  if (!el) return;
  el.className = 'prog-item ' + status;
  el.querySelector('.prog-dot').className = 'prog-dot';  // reset then re-apply via CSS
  el.className = 'prog-item ' + status;
  if (text) el.querySelector('span').textContent = text;
}
function log(msg) {
  const el = document.getElementById('logArea');
  if (el) { el.textContent += msg + '\n'; el.scrollTop = el.scrollHeight; }
}

/* ── Section 2: Analysis ───────────────────────────────────────────── */
async function runAnalysis() {
  const raw = document.getElementById('urlInput').value.trim();
  const urls = raw.split('\n').map(u => u.trim()).filter(u => u.length > 4);
  if (!urls.length) { alert('Paste at least one URL.'); return; }

  document.getElementById('progList').innerHTML = '';
  document.getElementById('logArea').textContent = '';
  goToSection(2);

  addProg('analyze', 'Fetching articles & running Onion Process...');
  setProg('analyze', 'active');

  // Generate a unique job ID
  const jobId = Date.now().toString(36) + Math.random().toString(36).slice(2);
  log('Submitting ' + urls.length + ' URL(s) — job ' + jobId);

  // Trigger background function (returns 202 immediately)
  try {
    const res = await fetch('/.netlify/functions/analyze-background', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ urls, jobId }),
    });
    if (res.status !== 202) {
      const d = await res.json().catch(() => ({}));
      throw new Error(d.error || 'HTTP ' + res.status);
    }
  } catch (err) {
    setProg('analyze', 'error', 'Failed to start analysis');
    log('ERROR: ' + err.message);
    return;
  }

  log('Analysis running with Sonnet 4.6 — polling for results...');

  // Poll job-status every 4 seconds, up to 3 minutes
  let data = null;
  const maxAttempts = 45;
  for (let i = 0; i < maxAttempts; i++) {
    await new Promise(r => setTimeout(r, 4000));
    try {
      const res = await fetch('/.netlify/functions/job-status?id=' + jobId);
      const s = await res.json();
      log('Poll ' + (i + 1) + ': ' + s.status);
      if (s.status === 'complete') { data = s; break; }
      if (s.status === 'error') throw new Error(s.error || 'Analysis failed');
    } catch (err) {
      setProg('analyze', 'error', 'Analysis failed');
      log('ERROR: ' + err.message);
      return;
    }
  }

  if (!data) {
    setProg('analyze', 'error', 'Timed out waiting for results');
    log('ERROR: No result after 3 minutes');
    return;
  }

  // Log fetch results
  (data.fetchResults || []).forEach(r => {
    log((r.ok ? 'OK' : 'ERR') + ' ' + r.url.slice(0, 60) + ' (' + r.chars + ' chars)');
  });

  setProg('analyze', 'done', 'Report generated — ' + (data.records || []).length + ' Onion records');
  STATE.report  = data.report  || '';
  STATE.records = data.records || [];

  await new Promise(r => setTimeout(r, 400));
  buildReviewSection();
  goToSection(3);
}

/* ── Section 3: Review ─────────────────────────────────────────────── */
function buildReviewSection() {
  document.getElementById('reportArea').value = STATE.report;
  document.getElementById('recCountBadge').textContent = STATE.records.length;

  const grid = document.getElementById('recordsGrid');
  if (!STATE.records.length) {
    grid.innerHTML = '<div class="warn-box">No structured records parsed. Report will push as a single fallback record.</div>';
    return;
  }

  grid.innerHTML = STATE.records.map((r, i) => {
    const catChips = r.category
      ? r.category.split(',').map(c => `<span class="chip chip-cat">${esc(c.trim())}</span>`).join('')
      : '';
    const tagChips = r.tags
      ? r.tags.split(',').map(t => `<span class="chip chip-tag">${esc(t.trim())}</span>`).join('')
      : '';
    return `
      <div class="rec-card">
        <div class="rec-card-title">${esc(r.title || 'Record ' + (i + 1))}</div>
        <div class="rec-meta">${esc(r.publication)} &middot; ${esc(r.date)} &middot; ${esc(r.status)}</div>
        <div class="rec-summary">${esc((r.summary || '').slice(0, 160))}${(r.summary || '').length > 160 ? '…' : ''}</div>
        ${catChips || tagChips ? `<div class="tags-row">${catChips}${tagChips}</div>` : ''}
      </div>`;
  }).join('');
}

/* ── Section 4: Notion push ────────────────────────────────────────── */
async function publishToNotion() {
  STATE.report = document.getElementById('reportArea').value;

  const records = STATE.records.length > 0 ? STATE.records : [{
    title: 'Sports Intelligence Report — ' + new Date().toLocaleDateString(),
    summary: STATE.report.slice(0, 2000),
    insight: '', opinion: '', perspective: '',
    publication: '', sourceUrl: '', date: new Date().toISOString().slice(0, 10),
    category: '', tags: '', governingBodies: '', sponsorshipCategory: '',
    teams: '', watchList: '', status: 'Source Captured',
  }];

  goToSection(4);
  const list = document.getElementById('resultsList');
  list.innerHTML = '';

  let successCount = 0;

  // Show pending items immediately
  const divs = records.map((rec, i) => {
    const d = document.createElement('div');
    d.className = 'result-item';
    d.innerHTML = `<span class="ri">⏳</span><div><div>${esc(rec.title)}</div></div>`;
    list.appendChild(d);
    return d;
  });

  let data;
  try {
    const res = await fetch('/.netlify/functions/push-notion', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ records }),
    });
    data = await res.json();
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
  } catch (err) {
    list.innerHTML = '';
    const eb = document.createElement('div');
    eb.className = 'error-box';
    eb.textContent = 'Push failed: ' + err.message;
    list.appendChild(eb);
    return;
  }

  // Update divs with results
  (data.results || []).forEach((r, i) => {
    const d = divs[i];
    if (!d) return;
    if (r.ok) {
      d.className = 'result-item result-ok';
      d.querySelector('.ri').textContent = '✓';
      if (r.url) {
        const a = document.createElement('a');
        a.href = r.url; a.target = '_blank';
        a.className = 'notion-link';
        a.textContent = 'Open in Notion →';
        d.querySelector('div > div').appendChild(a);
      }
      successCount++;
    } else {
      d.className = 'result-item result-fail';
      d.querySelector('.ri').textContent = '✗';
      const em = document.createElement('div');
      em.className = 'result-err-msg';
      em.textContent = r.error || 'Unknown error';
      d.querySelector('div').appendChild(em);
    }
  });

  const summary = document.createElement('div');
  summary.className = successCount === records.length ? 'success-box' : 'error-box';
  summary.textContent = successCount === records.length
    ? `✓ ${successCount} record${successCount !== 1 ? 's' : ''} published to Notion`
    : `${successCount}/${records.length} records succeeded`;
  list.appendChild(summary);
}

/* ── Copy helpers ──────────────────────────────────────────────────── */
function copyReport(fmt) {
  const md = document.getElementById('reportArea').value;
  let output;

  if (fmt === 'md') {
    // Raw markdown — copy as-is
    output = md;

  } else if (fmt === 'txt') {
    // Strip all markdown: bold, headers, horizontal rules
    output = md
      .replace(/\*\*(.*?)\*\*/g, '$1')       // **bold** → bold
      .replace(/^#{1,6}\s+/gm, '')           // # headers
      .replace(/^[-*]{3,}\s*$/gm, '---')     // *** or --- → plain dash line
      .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1') // [text](url) → text
      .replace(/`([^`]+)`/g, '$1');           // `code` → code

  } else if (fmt === 'html') {
    // Convert markdown to clean HTML
    const lines = md.split('\n');
    const htmlLines = [];
    let inP = false;

    for (let i = 0; i < lines.length; i++) {
      let line = lines[i];

      // Horizontal rule
      if (/^[-*]{3,}\s*$/.test(line.trim())) {
        if (inP) { htmlLines.push('</p>'); inP = false; }
        htmlLines.push('<hr>');
        continue;
      }

      // H1–H3
      const hm = line.match(/^(#{1,3})\s+(.*)/);
      if (hm) {
        if (inP) { htmlLines.push('</p>'); inP = false; }
        const lvl = hm[1].length;
        htmlLines.push(`<h${lvl}>${mdInline(hm[2])}</h${lvl}>`);
        continue;
      }

      // Blank line = paragraph break
      if (!line.trim()) {
        if (inP) { htmlLines.push('</p>'); inP = false; }
        continue;
      }

      // Regular text line
      const inline = mdInline(line);
      if (!inP) { htmlLines.push('<p>'); inP = true; }
      else       { htmlLines.push('<br>'); }
      htmlLines.push(inline);
    }
    if (inP) htmlLines.push('</p>');

    output = '<!DOCTYPE html>\n<html>\n<body style="font-family:Georgia,serif;max-width:680px;margin:40px auto;line-height:1.7;color:#1a1a2a">\n'
           + htmlLines.join('\n')
           + '\n</body>\n</html>';
  }

  navigator.clipboard.writeText(output).then(() => {
    const btnId = fmt === 'md' ? 'cpMd' : fmt === 'txt' ? 'cpTxt' : 'cpHtml';
    const btn = document.getElementById(btnId);
    const orig = btn.innerHTML;
    btn.innerHTML = '✓ Copied';
    btn.classList.add('copied');
    setTimeout(() => { btn.innerHTML = orig; btn.classList.remove('copied'); }, 2000);
  }).catch(() => alert('Copy failed — try selecting text manually.'));
}

function mdInline(s) {
  return s
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
}

/* ── Helpers ───────────────────────────────────────────────────────── */
function esc(s) {
  return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
</script>
</body>
</html>
